name: Build Windows Kiosk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    # windows-2022 ships VS 2022 (v17) — Flutter maps it to the right CMake
    # generator. windows-latest now has VS 2026 (v18) which Flutter can't target.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip release bundle (portable)
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath kadastr-kiosk-windows.zip

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Setup.exe)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\kiosk.iss'

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: kadastr-kiosk-windows
          path: kadastr-kiosk-windows.zip
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: kadastr-kiosk-setup
          path: installer_out/kadastr-kiosk-setup.exe
          retention-days: 30
