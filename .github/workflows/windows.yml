name: Build Windows Kiosk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Zip release bundle
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath kadastr-kiosk-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kadastr-kiosk-windows
          path: kadastr-kiosk-windows.zip
          retention-days: 30
